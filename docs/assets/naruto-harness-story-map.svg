<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">카카시 하네스 세계관 튜토리얼 맵</title>
  <desc id="desc">사용자가 호출자가 되고, 카카시 정원지기가 전문가와 현자를 배치하며, 차크라 카카시가 토큰 사용을 관찰하는 흐름을 설명하는 개념도.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="0.55" stop-color="#eef6f2"/>
      <stop offset="1" stop-color="#fff5e6"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0" x2="1">
      <stop offset="0" stop-color="#fff0c2"/>
      <stop offset="1" stop-color="#f7d58a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#21313c" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38515c"/>
    </marker>
    <style>
      .bg { fill: url(#sky); }
      .band { fill: #ffffff; opacity: 0.78; }
      .card { fill: #ffffff; stroke: #d8e1df; stroke-width: 2; filter: url(#softShadow); }
      .title { font: 800 42px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; fill: #1d2b31; }
      .subtitle { font: 500 20px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; fill: #586970; }
      .label { font: 800 28px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; fill: #1d2b31; }
      .small { font: 500 18px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; fill: #53646b; }
      .tiny { font: 500 15px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; fill: #65777d; }
      .pillText { font: 800 18px "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; fill: #233238; }
      .arrow { fill: none; stroke: #38515c; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #91a5a7; stroke-width: 2.5; stroke-dasharray: 8 10; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="760"/>
  <path class="band" d="M0 560 C180 505 300 595 470 540 C690 470 790 610 1010 540 C1180 488 1280 520 1400 480 L1400 760 L0 760 Z"/>

  <text x="70" y="82" class="title">카카시 하네스, 나루토식으로 읽기</text>
  <text x="72" y="120" class="subtitle">규칙 문서가 아니라 입문자를 위한 스토리 맵: 누가 부르고, 누가 배치하고, 누가 관찰하는가.</text>

  <rect x="64" y="170" width="270" height="360" rx="8" class="card"/>
  <circle cx="199" cy="270" r="70" fill="#f28c28"/>
  <path d="M164 270 C182 238 216 238 234 270 C216 292 182 292 164 270 Z" fill="#fff7eb"/>
  <circle cx="199" cy="270" r="18" fill="#1d2b31"/>
  <path d="M136 205 L170 230 M262 205 L228 230" stroke="#fff7eb" stroke-width="9" stroke-linecap="round"/>
  <text x="199" y="380" text-anchor="middle" class="label">나루토</text>
  <text x="199" y="414" text-anchor="middle" class="small">사용자 / 세션</text>
  <text x="199" y="448" text-anchor="middle" class="tiny">문제를 들고 들어오는 주인공</text>
  <text x="199" y="474" text-anchor="middle" class="tiny">필요하면 현자를 직접 소환한다</text>

  <rect x="408" y="170" width="270" height="360" rx="8" class="card"/>
  <circle cx="543" cy="270" r="70" fill="#d7dde0"/>
  <path d="M476 265 C515 225 571 225 610 265 C571 305 515 305 476 265 Z" fill="#ffffff"/>
  <circle cx="543" cy="265" r="28" fill="#293c45"/>
  <circle cx="543" cy="265" r="10" fill="#f05a4f"/>
  <path d="M493 344 L593 344 L572 372 L514 372 Z" fill="#3f5964"/>
  <text x="543" y="380" text-anchor="middle" class="label">카카시</text>
  <text x="543" y="414" text-anchor="middle" class="small">정원지기 / tamer</text>
  <text x="543" y="448" text-anchor="middle" class="tiny">직접 싸우기보다 배치를 설계한다</text>
  <text x="543" y="474" text-anchor="middle" class="tiny">사륜안으로 스킬의 구조를 읽는다</text>

  <rect x="752" y="170" width="270" height="360" rx="8" class="card"/>
  <rect x="810" y="218" width="154" height="116" rx="8" fill="url(#scroll)" stroke="#c8963c" stroke-width="3"/>
  <circle cx="810" cy="276" r="24" fill="#f7d58a" stroke="#c8963c" stroke-width="3"/>
  <circle cx="964" cy="276" r="24" fill="#f7d58a" stroke="#c8963c" stroke-width="3"/>
  <path d="M840 258 H934 M840 282 H934 M840 306 H912" stroke="#7a5a23" stroke-width="6" stroke-linecap="round"/>
  <path d="M887 205 C904 190 927 188 945 205 C930 214 914 218 887 205 Z" fill="#6a9c78"/>
  <text x="887" y="380" text-anchor="middle" class="label">현자</text>
  <text x="887" y="414" text-anchor="middle" class="small">거장의 사고 체계</text>
  <text x="887" y="448" text-anchor="middle" class="tiny">데밍: PDSA로 작업을 회고한다</text>
  <text x="887" y="474" text-anchor="middle" class="tiny">기술보다 깊은 사상을 빌려온다</text>

  <rect x="1096" y="170" width="240" height="360" rx="8" class="card"/>
  <circle cx="1216" cy="266" r="64" fill="#253741"/>
  <path d="M1172 266 C1196 239 1236 239 1260 266 C1236 293 1196 293 1172 266 Z" fill="#cde6ef"/>
  <circle cx="1216" cy="266" r="20" fill="#4fb3c8"/>
  <path d="M1156 350 H1276 M1169 382 H1263 M1184 414 H1248" stroke="#4fb3c8" stroke-width="8" stroke-linecap="round"/>
  <text x="1216" y="452" text-anchor="middle" class="label">차크라</text>
  <text x="1216" y="486" text-anchor="middle" class="small">토큰 / 감사</text>

  <path d="M334 350 C368 350 374 350 408 350" class="arrow"/>
  <path d="M678 350 C712 350 718 350 752 350" class="arrow"/>
  <path d="M1022 350 C1060 350 1062 350 1096 350" class="arrow"/>

  <rect x="120" y="594" width="1160" height="74" rx="8" fill="#ffffff" stroke="#d8e1df" stroke-width="2"/>
  <text x="152" y="623" class="pillText">한 줄로 요약</text>
  <text x="152" y="653" class="small">나루토는 문제를 가져오고, 카카시는 전문가를 배치하며, 현자는 사고법을 빌려주고, 차크라는 사용한 토큰을 관찰한다.</text>
  <path d="M196 530 C315 610 490 610 610 530" class="thin"/>
  <path d="M545 530 C690 635 850 635 940 530" class="thin"/>
</svg>
